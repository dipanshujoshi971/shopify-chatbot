# Shopify Theme App Extension Configuration
#
# This registers the chatbot as a theme app extension.
# Merchants enable/disable it from:
#   Shopify Admin → Online Store → Themes → Customize → App embeds
#
# Deployment:
#   1. Build the widget:  npm run build (in packages/widget)
#   2. Upload dist/widget.iife.js to your CDN / API static serving
#   3. Deploy extension:  shopify app deploy (from project root)

api_version = "2024-10"

[[extensions]]
type = "theme"
name = "Shopbot AI Chat"
handle = "shopbot-chat"

  [[extensions.blocks]]
  type = "app-embed"
  name = "Shopbot AI Chatbot"
  file = "blocks/chatbot.liquid"
