# Shopify Theme App Extension — Shopbot AI Chat
#
# This registers the chatbot as an App Embed Block.
# Merchants enable it from:
#   Shopify Admin → Online Store → Themes → Customize → App embeds
#
# Deploy:  shopify app deploy  (from project root)

api_version = "2026-04"

[[extensions]]
type = "theme"
name = "ShopChat AI"
handle = "shopbot-chat"

  [[extensions.blocks]]
  type = "app-embed"
  name = "ShopChat AI Chatbot"
  file = "blocks/chatbot.liquid"
